name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── napi .node builds ────────────────────────────────────────────────────────
  napi:
    name: napi / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node: '20'
          - os: macos-latest
            target: aarch64-apple-darwin
            node: '20'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node: '20'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps (X11)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxtst-dev libxi-dev

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      - name: Build .node
        working-directory: crates/napi
        run: napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: crates/napi/*.node
          if-no-files-found: error

  # ── bridge binary builds (Linux only) ────────────────────────────────────────
  bridge:
    name: bridge / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rinhook-bridge-linux-x86_64
            build_tool: cargo
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: rinhook-bridge-linux-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libinput / udev headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libinput-dev libudev-dev libxkbcommon-dev

      - name: Build bridge
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --features bridge \
            --bin rinhook-bridge

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/rinhook-bridge ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── publish npm + GitHub release ─────────────────────────────────────────────
  publish:
    name: Publish
    needs: [napi, bridge]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      - name: Download all napi artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          path: crates/napi/artifacts
          merge-multiple: false

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bridge-*
          path: bridge-binaries
          merge-multiple: true

      - name: Move napi artifacts into place
        working-directory: crates/napi
        run: napi artifacts

      - name: Publish to npm
        working-directory: crates/napi
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release with bridge binaries
        uses: softprops/action-gh-release@v2
        with:
          files: bridge-binaries/*
          generate_release_notes: true
